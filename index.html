<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zenithy - Welcome to my shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&family=Slackey&display=swap" rel="stylesheet">
    <style>
        :root {
            /* เปลี่ยนโทนสีเป็น ฟ้าอ่อน และน้ำตาลอ่อนละมุนตามบรีฟ */
            --color-pink-bg: #e6f4fa; /* พื้นหลังฟ้าอ่อนละมุน */
            --color-pink-dot: #fff;
            --color-pink-dark: #64b5f6; /* สีฟ้าหลัก */
            --color-pink-light: #b3e5fc; /* สีฟ้าพาสเทล */
            --color-brown-dark: #5c4033; /* น้ำตาลเข้มละมุน */
            --color-brown-light: #8b6c5c; /* น้ำตาลอ่อนละมุน */
        }
        /* ใช้ฟอนต์ Mitr สำหรับเนื้อหาทั่วไป */
        body {
            font-family: 'Mitr', sans-serif;
            background-color: var(--color-pink-bg);
            background-image: radial-gradient(var(--color-pink-dot) 15%, transparent 16%), radial-gradient(var(--color-pink-dot) 15%, transparent 16%);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
            color: var(--color-brown-dark);
            scroll-behavior: smooth;
        }
        /* ฟอนต์ส่วนหัว Slackey (เพิ่ม Mitr เป็น Fallback สำหรับภาษาไทย) */
        .font-slackey {
            font-family: 'Slackey', 'Mitr', cursive;
        }
        .text-shadow-cute {
            text-shadow: 2px 2px 0px #fff, 3px 3px 0px var(--color-pink-light);
        }
        /* Clean Container แทนแบบเก่า */
        .clean-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            box-shadow: 0 10px 40px rgba(100, 181, 246, 0.15);
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--color-pink-bg); }
        ::-webkit-scrollbar-thumb { background: var(--color-pink-dark); border-radius: 10px; }
        .modal-enter { animation: modalFadeIn 0.3s ease-out forwards; }
        .modal-exit { animation: modalFadeOut 0.2s ease-in forwards; }
       
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes modalFadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.95); }
        }
        /* Slider Animations */
        .slider-track {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .slide {
            min-width: 100%;
        }
    </style>
</head>
<body class="min-h-screen pb-12">
    <div id="menu-overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/30 backdrop-blur-sm z-40 hidden opacity-0 transition-opacity duration-300"></div>

                    <span class="text-[#64b5f6]"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z"/></svg></span> Goodnote App

            </div>

    <script>
        // ฟังก์ชันสำหรับเปิด-ปิดเมนูด้านข้าง (Sidebar)
        function toggleMenu() {
            const sidebar = document.getElementById('side-menu');
            const overlay = document.getElementById('menu-overlay');
            
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.add('opacity-100'), 10);
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.remove('opacity-100');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        // ระบบ Auto Slider สำหรับหน้าจอรีวิว/บริการ
        let currentSlide = 0;
        const track = document.getElementById('slider-track');
        const slides = document.querySelectorAll('.slide');
        
        function nextSlide() {
            currentSlide = (currentSlide + 1) % slides.length;
            track.style.transform = `translateX(-${currentSlide * 100}%)`;
        }
        
        // ให้สไลด์เปลี่ยนอัตโนมัติทุกๆ 3 วินาที
        setInterval(nextSlide, 3000);
    </script>
</body>
</html>
